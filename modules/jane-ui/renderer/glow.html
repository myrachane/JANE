<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>Glow</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;pointer-events:none}
.edge{position:fixed;opacity:0;transition:opacity .4s ease;pointer-events:none}
.edge.on{opacity:1}
#e-top{top:0;left:0;right:0;height:6px;background:linear-gradient(180deg,rgba(124,58,237,.85) 0%,transparent 100%);box-shadow:0 0 28px 6px rgba(124,58,237,.55)}
#e-btm{bottom:0;left:0;right:0;height:6px;background:linear-gradient(0deg,rgba(124,58,237,.85) 0%,transparent 100%);box-shadow:0 0 28px 6px rgba(124,58,237,.55)}
#e-lft{left:0;top:0;bottom:0;width:6px;background:linear-gradient(90deg,rgba(124,58,237,.85) 0%,transparent 100%);box-shadow:0 0 28px 6px rgba(124,58,237,.55)}
#e-rgt{right:0;top:0;bottom:0;width:6px;background:linear-gradient(270deg,rgba(124,58,237,.85) 0%,transparent 100%);box-shadow:0 0 28px 6px rgba(124,58,237,.55)}
.corner{position:fixed;width:100px;height:100px;opacity:0;transition:opacity .4s ease;pointer-events:none}
.corner.on{opacity:1}
#c-tl{top:0;left:0;background:radial-gradient(ellipse at top left,rgba(124,58,237,.55) 0%,transparent 70%)}
#c-tr{top:0;right:0;background:radial-gradient(ellipse at top right,rgba(124,58,237,.55) 0%,transparent 70%)}
#c-bl{bottom:0;left:0;background:radial-gradient(ellipse at bottom left,rgba(124,58,237,.45) 0%,transparent 70%)}
#c-br{bottom:0;right:0;background:radial-gradient(ellipse at bottom right,rgba(124,58,237,.45) 0%,transparent 70%)}
@keyframes glowPulse{0%,100%{opacity:.95}50%{opacity:.4}}
.glow-active .edge.on,.glow-active .corner.on{animation:glowPulse 1.6s ease-in-out infinite}
</style>
</head>
<body>
<div id="e-top" class="edge"></div>
<div id="e-btm" class="edge"></div>
<div id="e-lft" class="edge"></div>
<div id="e-rgt" class="edge"></div>
<div id="c-tl" class="corner"></div>
<div id="c-tr" class="corner"></div>
<div id="c-bl" class="corner"></div>
<div id="c-br" class="corner"></div>
<script>
const all=[...document.querySelectorAll('.edge,.corner')];
window.jane.on('glow:start',()=>{document.body.classList.add('glow-active');all.forEach(e=>e.classList.add('on'));});
window.jane.on('glow:stop', ()=>{document.body.classList.remove('glow-active');all.forEach(e=>e.classList.remove('on'));});
</script>
</body>
</html>
