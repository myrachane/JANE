<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self' 'unsafe-inline';">
<title>Jane Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: transparent; }
body { font-family: 'Inter', sans-serif; color: #fff; -webkit-font-smoothing: antialiased; user-select: none; }

#overlay {
  width: 100%; height: 100%;
  background: rgba(8,8,8,.96);
  border: 1px solid #2a2a2a;
  border-radius: 16px;
  backdrop-filter: blur(20px);
  display: flex; flex-direction: column; overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,.8), 0 0 0 1px rgba(124,58,237,.15);
}

/* Header / drag */
#ovl-hdr {
  display: flex; align-items: center; gap: 8px;
  padding: 11px 14px 9px;
  border-bottom: 1px solid #181818;
  -webkit-app-region: drag; cursor: grab;
}
#ovl-hdr:active { cursor: grabbing; }
.ovl-title { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #fff; flex: 1; }
.ovl-sub { font-size: 10px; color: #444; }
.ovl-close { -webkit-app-region: no-drag; width: 22px; height: 22px; border: none; background: transparent; border-radius: 5px; cursor: pointer; color: #444; font-size: 11px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.ovl-close:hover { background: rgba(239,68,68,.12); color: #ef4444; }

/* Status dot */
#ovl-status { width: 6px; height: 6px; border-radius: 50%; background: #333; flex-shrink: 0; }
#ovl-status.on { background: #7c3aed; box-shadow: 0 0 6px rgba(124,58,237,.6); }

/* Messages */
#ovl-msgs { flex: 1; overflow-y: auto; padding: 10px 12px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
#ovl-msgs::-webkit-scrollbar { width: 3px; }
#ovl-msgs::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

.ovl-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: #333; font-size: 11px; text-align: center; }

.om { max-width: 95%; font-size: 12px; line-height: 1.5; padding: 7px 10px; border-radius: 8px; animation: mIn .15s ease-out; }
@keyframes mIn { from { opacity:0; transform: translateY(3px); } }
.om.jane { background: #141414; border: 1px solid #1f1f1f; color: #e0e0e0; align-self: flex-start; border-top-left-radius: 3px; }
.om.user { background: #1a0f2e; border: 1px solid rgba(124,58,237,.25); color: #e0e0e0; align-self: flex-end; border-top-right-radius: 3px; }

/* Wave */
#ovl-wave { display: none; align-items: center; justify-content: center; gap: 2px; padding: 6px 12px; border-top: 1px solid #141414; height: 28px; }
#ovl-wave.on { display: flex; }
#ovl-wave .b { width: 2px; background: #7c3aed; border-radius: 1px; animation: wv .8s ease-in-out infinite; }
#ovl-wave .b:nth-child(1){height:4px;animation-delay:0s}
#ovl-wave .b:nth-child(2){height:8px;animation-delay:.08s}
#ovl-wave .b:nth-child(3){height:14px;animation-delay:.16s}
#ovl-wave .b:nth-child(4){height:18px;animation-delay:.24s}
#ovl-wave .b:nth-child(5){height:22px;animation-delay:.32s}
#ovl-wave .b:nth-child(6){height:18px;animation-delay:.40s}
#ovl-wave .b:nth-child(7){height:14px;animation-delay:.48s}
#ovl-wave .b:nth-child(8){height:8px;animation-delay:.56s}
#ovl-wave .b:nth-child(9){height:4px;animation-delay:.64s}
@keyframes wv { 0%,100%{transform:scaleY(.3);opacity:.5} 50%{transform:scaleY(1);opacity:1} }

/* Thinking */
.think { display: flex; gap: 4px; align-items: center; padding: 7px 10px; background: #141414; border: 1px solid #1f1f1f; border-radius: 8px; border-top-left-radius: 3px; align-self: flex-start; }
.think span { width: 4px; height: 4px; border-radius: 50%; background: #7c3aed; animation: tb 1.2s infinite; }
.think span:nth-child(2){animation-delay:.15s} .think span:nth-child(3){animation-delay:.30s}
@keyframes tb { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-4px);opacity:1} }

/* Input */
#ovl-input { border-top: 1px solid #181818; padding: 8px; display: flex; gap: 6px; align-items: flex-end; }
#ovl-in { flex: 1; background: #111; border: 1px solid #1f1f1f; border-radius: 8px; padding: 7px 10px; color: #fff; font-size: 12px; font-family: 'Inter', sans-serif; outline: none; resize: none; max-height: 60px; min-height: 30px; scrollbar-width: none; user-select: text; transition: border-color .15s; line-height: 1.4; }
#ovl-in::placeholder { color: #333; }
#ovl-in:focus { border-color: rgba(124,58,237,.4); }
#ovl-in::-webkit-scrollbar { display: none; }
.ovl-send { width: 30px; height: 30px; background: #7c3aed; border: none; border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; transition: all .15s; flex-shrink: 0; }
.ovl-send:hover { background: #6d28d9; }
.ovl-send:disabled { background: #1a1a1a; color: #333; cursor: not-allowed; }

/* Listening indicator */
#ovl-listen-bar {
  display: none; align-items: center; gap: 8px;
  padding: 6px 14px; background: rgba(124,58,237,.08);
  border-top: 1px solid rgba(124,58,237,.15);
  font-family: 'Space Mono', monospace; font-size: 10px; color: rgba(124,58,237,.8);
}
#ovl-listen-bar.on { display: flex; }
.listen-dot { width: 6px; height: 6px; border-radius: 50%; background: #7c3aed; animation: lp 1s infinite; }
@keyframes lp{0%,100%{opacity:1}50%{opacity:.2}}
</style>
</head>
<body>
<div id="overlay">
  <div id="ovl-hdr">
    <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"
      style="width:22px;height:22px;fill:#6d41be;filter:drop-shadow(0 0 8px rgba(109,65,190,.5));-webkit-app-region:no-drag;flex-shrink:0">
      <path d="M4 6h10v4h-4v4h4v4h-4v4h4v4h-10v-20zM22 6v4h-4v4h4v4h-4v4h4v4h6v-20h-6z"/>
    </svg>
    <span class="ovl-title">JANE</span>
    <div id="ovl-status"></div>
    <span class="ovl-sub">overlay</span>
    <button class="ovl-close" onclick="window.jane.close()">✕</button>
  </div>

  <div id="ovl-msgs">
    <div class="ovl-placeholder" id="ovl-ph">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"
        style="width:28px;height:28px;fill:#6d41be;opacity:.4">
        <path d="M4 6h10v4h-4v4h4v4h-4v4h4v4h-10v-20zM22 6v4h-4v4h4v4h-4v4h4v4h6v-20h-6z"/>
      </svg>
      Ask Jane anything
    </div>
  </div>

  <!-- Wave shown while TTS speaking -->
  <div id="ovl-wave">
    <div class="b"></div><div class="b"></div><div class="b"></div>
    <div class="b"></div><div class="b"></div><div class="b"></div>
    <div class="b"></div><div class="b"></div><div class="b"></div>
  </div>

  <!-- Listening indicator shown when voice active -->
  <div id="ovl-listen-bar">
    <div class="listen-dot"></div>
    <span id="ovl-listen-txt">Listening…</span>
  </div>

  <div id="ovl-input">
    <textarea id="ovl-in" rows="1" placeholder="Ask Jane… or say Hey Jane"
      onkeydown="handleKey(event)" oninput="autoR(this)"></textarea>
    <button class="ovl-send" id="ovl-send" onclick="send()">↑</button>
  </div>
</div>

<script>
let busy = false, thinkEl = null;

// ── IPC ───────────────────────────────────────────────────
window.jane.on('status', d => {
  document.getElementById('ovl-status').className = d.connected ? 'on' : '';
});

window.jane.on('agent:event', e => {
  if (e.type==='thinking') { showPH(false); showThink(); }
  else if (e.type==='tool_result') { hideThink(); }
  else if (e.type==='response') { hideThink(); addMsg('jane', e.text); showWave(); }
  else if (e.type==='error')    { hideThink(); addMsg('jane', '⚠ '+e.message); }
});

window.jane.on('agent:done', () => { busy=false; setInput(true); hideWave(); });

// When island triggers from wake word — show listening
window.jane.on('island:activated', () => {
  const bar = document.getElementById('ovl-listen-bar');
  bar.classList.add('on');
  setTimeout(() => bar.classList.remove('on'), 4000);
});

window.jane.on('voice:transcript', d => {
  document.getElementById('ovl-listen-bar').classList.remove('on');
  if (d.transcript) {
    const i = document.getElementById('ovl-in');
    i.value = d.transcript; autoR(i);
  }
});

// ── UI helpers ────────────────────────────────────────────
function showPH(on) {
  const ph = document.getElementById('ovl-ph');
  if (ph) ph.style.display = on ? '' : 'none';
}

function addMsg(who, txt) {
  showPH(false);
  const el = document.createElement('div');
  el.className = 'om '+who;
  el.textContent = txt.slice(0, 500) + (txt.length>500?'…':'');
  document.getElementById('ovl-msgs').appendChild(el);
  scrollB();
}

function showThink() {
  hideThink();
  thinkEl = document.createElement('div');
  thinkEl.className = 'think';
  thinkEl.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('ovl-msgs').appendChild(thinkEl);
  scrollB();
}
function hideThink() { if(thinkEl){thinkEl.remove();thinkEl=null;} }
function showWave() { document.getElementById('ovl-wave').classList.add('on'); }
function hideWave() { document.getElementById('ovl-wave').classList.remove('on'); }

function send() {
  const inp = document.getElementById('ovl-in');
  const txt = inp.value.trim();
  if (!txt || busy) return;
  inp.value = ''; autoR(inp);
  addMsg('user', txt);
  busy = true; setInput(false);
  window.jane.sendMessage(txt, null);
}

function handleKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoR(el) {
  el.style.height='auto';
  el.style.height = Math.min(el.scrollHeight, 60)+'px';
}

function setInput(on) {
  document.getElementById('ovl-send').disabled = !on;
  document.getElementById('ovl-in').disabled = !on;
  if (on) document.getElementById('ovl-in').focus();
}

function scrollB() {
  const m = document.getElementById('ovl-msgs');
  requestAnimationFrame(()=>{ m.scrollTop=m.scrollHeight; });
}

document.getElementById('ovl-in').focus();
</script>
</body>
</html>
